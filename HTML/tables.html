<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        table,td{
            border: 1px solid black;
            border-collapse: collapse;
            margin: 30px;
        }
        td{
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="wrapp">
        <table>
            <tr></tr>
                <td>1</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
            </tr>
        </table>

        <table>
            <tr>
                <td rowspan="2"></td>
                <th colspan="2">Average</th>
                <td rowspan="2">red eyes</td>
            </tr>
            <tr>
                <td>height</td>
                <td>weight</td>
            </tr>
            <tr>
                <td>males</td>
                <td>1.9</td>
                <td>0.003</td>
                <td>40%</td>
            </tr>
            <tr>
                <td>females</td>
                <td>1.7</td>
                <td>0.002</td>
                <td>43%</td>
            </tr>
        </table>
    </div>

</body>
</html>
