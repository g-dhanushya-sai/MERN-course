<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradients</title>
    <style>
        h1{
            color: red;
            background-color: yellow;
        }
        #container{
            border: 1px solid black;
            width: 700px;
            color: white;
            height: 400px;
            background-color: white;
            
        }
        body{
            background: linear-gradient(rgb(5, 0, 1), rgb(219, 13, 41));
            background-size: cover;
            background-repeat: no-repeat;
            height: 1000px;
            background-attachment: fixed;
        }

    </style>
</head>
<body>
    <div id="container">
        <h1>Code thread</h1>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Est autem ipsum omnis illum libero nulla recusandae, dolor similique iste, ea eveniet. Voluptas, ex eius reprehenderit nihil cumque voluptate at tenetur.</p>
    </div>
</body>
</html>
