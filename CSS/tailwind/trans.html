<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .box{
        width: 200px;
        height: 200px;
        background-color: aqua;
    }
    .box:hover{
        width: 500px;
        height: 500px;
        transition: 5s;
        background-color: red;
    }

</style>
<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>
</html>
