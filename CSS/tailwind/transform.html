<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        width: 200px;
        height: 200px;
        background-color: aqua;
        margin: 50px;
        transition: all 0.5s;
    }
    .box:hover{
        transform: perspective(100px) scaleZ(1.2) rotateX('30deg');

    }
</style>
<body>
    <div class="box">
        DABBA
    </div>
</body>
</html>
